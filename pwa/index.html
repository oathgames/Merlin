<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080a">
<title>Merlin</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="status-bar">
  <div id="brand-mark">
    <svg id="brand-logo" width="20" height="20" viewBox="0 0 256 256" aria-hidden="true">
      <defs>
        <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#a78bfa"/>
          <stop offset="100%" stop-color="#34d399"/>
        </linearGradient>
      </defs>
      <rect width="256" height="256" rx="48" fill="#08080a"/>
      <text x="128" y="188" text-anchor="middle" font-size="180" font-family="serif" fill="url(#brand-grad)">✦</text>
    </svg>
    <span id="brand-wordmark">Merlin</span>
  </div>
  <div id="status-right">
    <span id="status-dot"></span>
    <span id="status-text">Connecting</span>
    <button id="settings-btn" aria-label="Settings" title="Devices &amp; sign-out">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
    </button>
  </div>
</div>

<div id="settings-drawer" class="hidden" role="dialog" aria-labelledby="settings-title" aria-modal="true">
  <div id="settings-panel">
    <div id="settings-head">
      <div id="settings-title">Devices</div>
      <button id="settings-close" aria-label="Close">&times;</button>
    </div>
    <div id="settings-sub">Sign out any phone that connected with Merlin. This device is listed first.</div>
    <div id="devices-list" aria-live="polite"></div>
    <button id="btn-signout" class="btn-action btn-deny-style">Sign out this device</button>
    <div id="settings-error" class="hidden"></div>
  </div>
</div>

<div id="chat">
  <div id="messages"></div>
</div>

<div id="input-bar">
  <textarea id="input" placeholder="Message Merlin..." rows="1"></textarea>
  <button id="send-btn" aria-label="Send (hold to record voice)">
    <svg id="send-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 L11 13"/><path d="M22 2 L15 22 L11 13 L2 9 Z"/></svg>
    <svg id="mic-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v2a7 7 0 0 0 14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
  </button>
</div>

<div id="voice-pill" class="hidden">
  <div id="voice-pill-row">
    <span id="voice-dot"></span>
    <span id="voice-pill-title">Listening…</span>
  </div>
  <span id="voice-pill-sub">release to send</span>
</div>

<div id="install-banner" class="hidden">
  <div id="install-icon">
    <svg width="32" height="32" viewBox="0 0 256 256" aria-hidden="true">
      <defs>
        <linearGradient id="install-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#a78bfa"/>
          <stop offset="100%" stop-color="#34d399"/>
        </linearGradient>
      </defs>
      <rect width="256" height="256" rx="48" fill="#08080a"/>
      <text x="128" y="188" text-anchor="middle" font-size="180" font-family="serif" fill="url(#install-grad)">✦</text>
    </svg>
  </div>
  <div id="install-copy">
    <div id="install-title">Install Merlin</div>
    <div id="install-desc">Add to Home Screen for push approvals.</div>
  </div>
  <button id="install-yes" class="btn-install">Install</button>
  <button id="install-no" class="btn-install-dismiss" aria-label="Dismiss">&times;</button>
</div>

<div id="approval" class="hidden">
  <div id="approval-label"></div>
  <div id="approval-cost"></div>
  <div id="approval-actions">
    <button id="btn-approve" class="btn-action btn-approve-style">Allow</button>
    <button id="btn-deny" class="btn-action btn-deny-style">Not now</button>
  </div>
</div>

<script src="pwa.js"></script>
</body>
</html>
