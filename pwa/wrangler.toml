name = "merlin-pwa"
main = "worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[rules]]
type = "Text"
globs = ["**/*.html", "**/*.js", "**/*.css", "**/*.json"]

# Route: pwa.merlingotme.com — the roaming PWA origin. The Worker pins CSP
# connect-src to relay.merlingotme.com so we can't accidentally exfiltrate
# user data to a third party.
#
# `custom_domain = true` lets Cloudflare manage the DNS record + edge cert
# automatically. Matches relay/wrangler.toml so both subdomains follow the
# same deploy pattern — no hand-maintained DNS rows.
[[routes]]
pattern = "pwa.merlingotme.com"
custom_domain = true
