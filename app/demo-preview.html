<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merlin Demo Reel Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a1a1c;
  --bg-deep:#141416;
  --surface:#242428;
  --border:#333338;
  --text:#e4e4e7;
  --text-muted:#a1a1aa;
  --text-dim:#71717a;
  --accent:#a78bfa;
  --success:#34d399;
  --font:'Inter',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column}

#titlebar{
  display:flex;align-items:center;height:40px;
  background:var(--bg-deep);border-bottom:1px solid var(--border);flex-shrink:0;
}
.titlebar-title{
  font-size:12px;font-weight:600;letter-spacing:.02em;padding-left:14px;
  background:linear-gradient(135deg,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

#chat{flex:1;overflow-y:auto;padding:16px 16px 8px;scroll-behavior:smooth}
#messages{display:flex;flex-direction:column;gap:12px;min-height:100%;justify-content:flex-end}

.msg-claude{align-self:flex-start;display:flex;gap:8px;max-width:88%}
.msg-avatar{flex-shrink:0;font-size:11px;margin-top:6px;color:var(--text-dim)}
.msg-bubble{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px 18px 18px 4px;padding:12px 16px;
  color:var(--text);font-size:14px;line-height:1.6;
}

.demo-slides{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.demo-slide{
  padding:12px 16px;
  background:linear-gradient(135deg,rgba(167,139,250,.05),rgba(52,211,153,.03));
  border:1px solid rgba(167,139,250,.1);
  border-radius:12px;
  font-size:13px;color:var(--text-muted);line-height:1.5;
  opacity:0;transform:translateY(6px);
  transition:opacity .6s ease, transform .6s ease;
}
.demo-slide.visible{opacity:1;transform:translateY(0)}
.demo-slide strong{color:var(--text);font-weight:600}
.demo-icon{margin-right:6px;font-size:14px}
.demo-stat{
  display:inline-block;
  font-size:11px;font-weight:600;
  color:var(--success);
  background:rgba(52,211,153,.08);
  border-radius:6px;
  padding:2px 7px;
  margin-left:6px;
}

.status-line{
  font-size:12px;color:var(--text-dim);
  margin-top:12px;
  opacity:0;transition:opacity .5s ease;
}
.status-line.visible{opacity:1}

#input-bar{
  flex-shrink:0;display:flex;align-items:flex-end;gap:8px;
  padding:10px 16px 14px;border-top:1px solid var(--border);background:var(--bg-deep);
}
#input{
  flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:10px 14px;color:var(--text);font-family:var(--font);font-size:14px;
  resize:none;outline:none;opacity:.5;
}
#send-btn{
  width:38px;height:38px;border:none;
  background:linear-gradient(135deg,#a78bfa,#34d399);color:#0a0a0a;
  border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:.2;
}
</style>
</head>
<body>

<div id="titlebar">
  <span class="titlebar-title">✦ Merlin</span>
</div>

<div id="chat">
  <div id="messages">
    <div class="msg-claude">
      <div class="msg-avatar">✦</div>
      <div class="msg-bubble">
        Hey — I'm Merlin, your AI marketing wizard.
        <br>Drop your website below and I'll work some magic.
        <div class="demo-slides" id="slides"></div>
        <div class="status-line" id="status">Setting up your workspace...</div>
      </div>
    </div>
  </div>
</div>

<div id="input-bar">
  <textarea id="input" placeholder="Message Merlin..." rows="1" readonly></textarea>
  <button id="send-btn" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2 L11 13"/><path d="M22 2 L15 22 L11 13 L2 9 Z"/></svg>
  </button>
</div>

<script>
const slides = [
  { icon: '🎨', text: '<strong>Ad creatives</strong> from your product photos', stat: '~$0.04 each' },
  { icon: '📣', text: '<strong>Meta, TikTok, Google, Amazon</strong> ads — launched and optimized', stat: 'all platforms' },
  { icon: '🔍', text: '<strong>SEO audits</strong> and blog posts that rank on Google', stat: 'auto-published' },
  { icon: '⚡', text: '<strong>Daily autopilot</strong> — new content every morning, losers killed, winners scaled', stat: 'runs while you sleep' },
  { icon: '📊', text: '<strong>One dashboard</strong> for spend, ROAS, and what's actually working', stat: 'all channels' },
];

const container = document.getElementById('slides');
const status = document.getElementById('status');

// Build all slides in the DOM upfront, hidden
slides.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'demo-slide';
  div.innerHTML = `<span class="demo-icon">${s.icon}</span>${s.text}<span class="demo-stat">${s.stat}</span>`;
  container.appendChild(div);
});

const slideEls = container.querySelectorAll('.demo-slide');

// Reveal one slide at a time, gently
let i = 0;
setTimeout(() => { status.classList.add('visible'); }, 500);

function revealNext() {
  if (i < slideEls.length) {
    slideEls[i].classList.add('visible');
    i++;
    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
  }
}

// First slide after 2s, then every 3s — slow, calm cadence
setTimeout(revealNext, 2000);
setInterval(revealNext, 3000);
</script>
</body>
</html>
