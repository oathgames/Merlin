<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Acme Streetwear</title>
  <meta name="description" content="Premium streetwear crafted in small batches.">
  <meta name="theme-color" content="#ff6f00">
  <meta property="og:image" content="/assets/og-image.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch.png" sizes="180x180">
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="icon" href="/assets/icon-512.png" sizes="512x512">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@500&display=swap">
  <style>
    :root {
      --color-brand: #ff6f00;
      --color-accent: #102a43;
      --color-text: #1a1a1a;
    }
    body {
      font-family: "Inter", sans-serif;
      color: #1a1a1a;
      background: #ffffff;
    }
    h1 {
      font-family: "Space Grotesk", sans-serif;
      color: rgb(16, 42, 67);
      font-size: 48px;
    }
    .btn {
      background-color: #ff6f00;
      color: rgba(255, 255, 255, 1);
      border: 1px solid #cc5800;
    }
  </style>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Acme Streetwear",
      "logo": "/assets/logo.png",
      "sameAs": [
        "https://instagram.com/acme",
        "https://tiktok.com/@acme"
      ]
    }
  </script>
</head>
<body>
  <header>
    <img class="site-logo" src="/assets/logo-header.png" alt="Acme logo">
    <nav>
      <a href="/">Home</a>
      <a href="/shop">Shop</a>
    </nav>
  </header>
  <main>
    <section class="hero">
      <h1>Built for the block.</h1>
      <p>Every piece hand-cut. Every drop limited.</p>
      <button class="btn">Shop the drop</button>
    </section>
  </main>
  <footer>
    <p>&copy; Acme 2026</p>
  </footer>
</body>
</html>
